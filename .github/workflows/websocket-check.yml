# WebSocket Health Check (custom, not template-generated)
#
# Runs both WebSocket health-check scripts on a schedule and commits the result
# to the corresponding history/*.yml files. This closes the gap where the
# auto-generated Uptime CI only HTTP-probes WebSocket endpoints (which can't
# detect real protocol-level failures) and the script-based tests only ran
# from the manual Run All CI.
#
# This file is NOT regenerated by Upptime's update-template workflow.

name: WebSocket CI

on:
  schedule:
    - cron: "0 * * * *"   # Hourly, same cadence as Uptime CI
  workflow_dispatch:

jobs:
  check:
    name: Run WebSocket health checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ws
        run: npm install ws

      - name: Test /ws (live price stream)
        run: node .github/scripts/test-websocket.js
        env:
          PRIXE_API_KEY: ${{ secrets.PRIXE_API_KEY }}
          PRIXE_PRO_API_KEY: ${{ secrets.PRIXE_PRO_API_KEY }}
          WEBSOCKET_RESULT_FILE: ${{ github.workspace }}/websocket-result.json
        continue-on-error: true

      - name: Update /ws history
        run: node .github/scripts/update-websocket-history.js
        env:
          WEBSOCKET_RESULT_FILE: ${{ github.workspace }}/websocket-result.json

      - name: Test /nasdaq (Nasdaq streaming)
        run: node .github/scripts/test-nasdaq-websocket.js
        env:
          PRIXE_PRO_PLUS_API_KEY: ${{ secrets.PRIXE_PRO_PLUS_API_KEY }}
          NASDAQ_WS_RESULT_FILE: ${{ github.workspace }}/nasdaq-ws-result.json
        continue-on-error: true

      - name: Update /nasdaq history
        run: node .github/scripts/update-nasdaq-websocket-history.js
        env:
          NASDAQ_WS_RESULT_FILE: ${{ github.workspace }}/nasdaq-ws-result.json

      - name: Test /crypto (crypto streaming)
        run: node .github/scripts/test-crypto-websocket.js
        env:
          PRIXE_PRO_PLUS_API_KEY: ${{ secrets.PRIXE_PRO_PLUS_API_KEY }}
          CRYPTO_WS_RESULT_FILE: ${{ github.workspace }}/crypto-ws-result.json
        continue-on-error: true

      - name: Update /crypto history
        run: node .github/scripts/update-crypto-websocket-history.js
        env:
          CRYPTO_WS_RESULT_FILE: ${{ github.workspace }}/crypto-ws-result.json

      - name: Test /order_book (L2 order book streaming)
        run: node .github/scripts/test-order-book-websocket.js
        env:
          PRIXE_PRO_PLUS_API_KEY: ${{ secrets.PRIXE_PRO_PLUS_API_KEY }}
          ORDER_BOOK_WS_RESULT_FILE: ${{ github.workspace }}/order-book-ws-result.json
        continue-on-error: true

      - name: Update /order_book history
        run: node .github/scripts/update-order-book-websocket-history.js
        env:
          ORDER_BOOK_WS_RESULT_FILE: ${{ github.workspace }}/order-book-ws-result.json

      - name: Commit history updates
        # One commit per history file, using Upptime's exact message format
        # ("<emoji> <Name> is <up|down> (<code> in <ms> ms) [skip ci] [upptime]").
        # Upptime's summary generator derives each site's current status by parsing
        # the LATEST commit message of its history file, so a generic message like
        # "chore(ws): update..." makes the summary fall back to "down" even when the
        # file says status: up. See https://github.com/upptime/upptime summary action.
        run: |
          git config user.name "Upptime Bot"
          git config user.email "73812536+upptime-bot@users.noreply.github.com"

          committed=0
          commit_site() {
            local file="$1" name="$2"
            git add "$file"
            if git diff --staged --quiet -- "$file"; then
              echo "No change for $name"
              return
            fi
            local status code rt emoji
            status=$(grep '^status:' "$file" | awk '{print $2}')
            code=$(grep '^code:' "$file" | awk '{print $2}')
            rt=$(grep '^responseTime:' "$file" | awk '{print $2}')
            if [ "$status" = "up" ]; then emoji="🟩"; else emoji="🟥"; fi
            git commit -m "$emoji $name is $status ($code in $rt ms) [skip ci] [upptime]"
            committed=1
          }

          commit_site history/web-socket-server.yml "WebSocket Server"
          commit_site history/nasdaq-streaming-web-socket.yml "Nasdaq Streaming WebSocket"
          commit_site history/crypto-streaming-web-socket.yml "Crypto Streaming WebSocket"
          commit_site history/order-book-web-socket.yml "Order Book WebSocket"

          if [ "$committed" -eq 1 ]; then
            git push
          else
            echo "No history changes to commit."
          fi
