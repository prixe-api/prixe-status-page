# Response-Body Validation CI (custom, not template-generated)
#
# Upptime's Uptime CI only checks HTTP status codes, so an endpoint that returns
# 200 with empty / malformed / wrong-shaped data still shows green. This workflow
# calls every monitored REST endpoint with the right API key and validates the
# response BODY against a per-endpoint contract (.github/scripts/
# response-validation.config.js). The job fails when real data drift is detected.
#
# This file is NOT regenerated by Upptime's update-template workflow.

name: Response Validation CI

on:
  schedule:
    # Hourly at :30 — offset from the top-of-hour Uptime/WebSocket/response-time
    # runs so the scheduler doesn't queue them all at once. Public repo => Actions
    # minutes are unlimited & free, so hourly has no billing cost.
    - cron: "30 * * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    name: Validate response bodies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'   # global fetch is built in; no dependencies needed

      - name: Validate response bodies
        run: node .github/scripts/validate-response-bodies.js
        env:
          PRIXE_API_KEY: ${{ secrets.PRIXE_API_KEY }}
          PRIXE_PRO_API_KEY: ${{ secrets.PRIXE_PRO_API_KEY }}
          PRIXE_PRO_PLUS_API_KEY: ${{ secrets.PRIXE_PRO_PLUS_API_KEY }}
          RESPONSE_VALIDATION_RESULT_FILE: ${{ github.workspace }}/response-validation-result.json

      - name: Upload validation results
        if: always()   # keep the report even when validation fails
        uses: actions/upload-artifact@v4
        with:
          name: response-validation-result
          path: response-validation-result.json
          if-no-files-found: ignore
          retention-days: 14
